services:
  - type: web
    name: jyoti-stock
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DB_PATH
        value: /data/ops.db
    disk:
      name: jyoti-db
      mountPath: /data
      sizeGB: 1
